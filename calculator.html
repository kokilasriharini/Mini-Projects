<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
</head>
<style>
*,*::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
:root {
  --bg: #0a0a0b;
  --panel: #111114;
  --surface: #18181d;
  --surface2: #222228;
  --border: rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.14);
  --lime: #c8f135;
  --lime-dim: #9fbe28;
  --violet: #a78bfa;
  --red: #f87171;
  --text: #f4f4f5;
  --muted: #71717a;
  --dim: #3f3f46;
}
body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.Calculator{
    display: flex;
    justify-content: center;
    flex-direction: column;
    border-radius: 10px;
    border: 2px solid var(--border);
    width:350px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:0.3s;
}
.Calculator:hover{
    transform:translateY(-2px);
}
.numbtn{
    display: grid;
    grid-template-columns:repeat(4,1fr);
    padding: 10px;
    width:100%;
    gap: 5px;
}
.numbtn button{
    width:60px;
    height:60px;
    border-radius:50%;
    border: none;
    transition:0.2s;
    cursor:pointer;
    background: var(--panel);
    color:var(--lime-dim);
    font-size:30px;
}
.numbtn button:hover{
    transform:translateY(-3px);
    color:var(--text);
}
.history:hover{
    color: white;
    background-color: var(--surface2);
}
.numbtn button:active{
    transform:scale(0.95);
}
#inputBox{
    background: var(--muted);
    padding: 20px;
    border: none;
    font-size: 30px;
    color: var(--text);
    width:100%;
    transition: 0.3s;
    outline:none;
}
#inputBox:focus{
    outline:none;
    border:none;
    box-shadow:none;
}
.numbtn button:nth-child(1){
    color: var(--violet);
}
.numbtn button:nth-child(2){
    color: var(--red);
}
.numbtn button:nth-child(3){
    color: var(--red);
}.numbtn button:nth-child(4){
    color: var(--red);
}
.numbtn button:nth-child(8){
    color: var(--red);
}
.numbtn button:nth-child(12){
    color: var(--red);
}
.numbtn button:nth-child(16){
    color: var(--red);
}
.numbtn button:nth-child(20){
    color: var(--text);
    background: var(--lime-dim);
}
.optional{
   width:100%;
   padding:10px 0;
   display:flex;
   justify-content:space-between;
   align-items:center;
}
.optional button{
    padding:10px 15px;
    background:var(--bg);
    color:var(--text);
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
    font-size: 16px;
}
.optional button:hover{
    transform:translateY(-2px);
}
#historyPanel{
    background: var(--surface);
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    max-height:150px;
    overflow-y:auto;
}

#historyPanel div{
    padding:8px;
    border-bottom:1px solid var(--border);
    color: var(--text);
}
@media (max-width:500px){

    .Calculator{
        padding:15px;
    }

    .numbtn button{
        font-size:16px;
    }

    #inputBox{
        font-size:20px;
    }
}
.delbtn:hover{
    background: var(--del);
}
</style>
<body>
<div class="Calculator">
    <div id="historyPanel" style="display:none;"></div>
    <div class="inputdiv">
        <input type="text" id="inputBox" placeholder="0">
    </div>
    <div class="optional">
        <button onclick="Historys()" style = "color: #71717e;" class="history">HISTORY</button>
        <button onclick="Delbtn()" style = "color: #71717e;" class="delbtn">⌫</button>
    </div>
    <div class="numbtn">
        <button onclick="clearAll()" class="clear">C</button>
        <button onclick="bracketer('()')">()</button>
        <button onclick="numberinput('%')">%</button>
        <button onclick="numberinput('/')">÷</button>

        <button onclick="numberinput('1')">1</button>
        <button onclick="numberinput('2')">2</button>
        <button onclick="numberinput('3')">3</button>
        <button onclick="numberinput('*')">x</button>

        <button onclick="numberinput('4')">4</button>
        <button onclick="numberinput('5')">5</button>
        <button onclick="numberinput('6')">6</button>
        <button onclick="numberinput('-')">-</button>

        <button onclick="numberinput('7')">7</button>
        <button onclick="numberinput('8')">8</button>
        <button onclick="numberinput('9')">9</button>
        <button onclick="numberinput('+')">+</button>

        <button onclick="numberinput('+/-')">+/-</button>
        <button onclick="numberinput('0')">0</button>
        <button onclick="numberinput('.')">.</button>
        <button onclick="calculate()">=</button>
        </div>
    </div>
<script>
let historyArray = JSON.parse(localStorage.getItem("calcHistory")) || [];
let lastChar = "";
function numberinput(val){

    const inputbox = document.getElementById("inputBox");
    const input = inputbox.value;

    // OPERATOR LOGIC
    if(/[+\-*/%]/.test(val)){

        // prevent starting with + * /
        if(input === "" && val !== "-"){
            return;
        }

        // replace old operator
        if(/[+\-*/%]$/.test(input)){
            inputbox.value = input.slice(0,-1) + val;
        }
        else{
            inputbox.value = input + val;
        }

        lastChar = val;
        return;
    }

    // DECIMAL LOGIC
    if(val === "."){

        const lastOp = Math.max(
            input.lastIndexOf("+"),
            input.lastIndexOf("-"),
            input.lastIndexOf("*"),
            input.lastIndexOf("/"),
            input.lastIndexOf("%")
        );

        const currentToken = input.slice(lastOp + 1);

        // prevent multiple decimals
        if(currentToken.includes(".")){
            return;
        }

        // start decimal with 0.
        if(currentToken === ""){
            inputbox.value = input + "0.";
        }
        else{
            inputbox.value = input + ".";
        }

        lastChar = ".";
        return;
    }

    // NORMAL NUMBER
    inputbox.value = input + val;

    lastChar = val;
    updateDelColor();
}

function bracketer() {
  const inputbox = document.getElementById("inputBox");
  const input = inputbox.value;
  // count open and close
  const open = (input.match(/\(/g) || []).length;
  const close = (input.match(/\)/g) || []).length;

  // if nothing or last char is operator or "(" -> insert "("
  if (input === "" || /[+\-*/%(]$/.test(input)) {
    inputbox.value = input + "(";
    return;
  }

  // if more opens than closes and last char is digit or ")" -> insert ")"
  if (open > close && /[0-9.]|\)$/.test(input.slice(-1))) {
    inputbox.value = input + ")";
    return;
  }

  // otherwise insert "("
  inputbox.value = input + "(";
}
function calculate(){

    const inputbox = document.getElementById("inputBox");
    const input = inputbox.value.trim();

    // VALIDATION
    if(!/^[0-9+\-*/().\s%]+$/.test(input) || input === ""){
        inputbox.value = "Error";
        return;
    }

    try{
        const total = eval(input);
         saveHistory(input, total);
        inputbox.value = total;
    }

    catch(e){
        inputbox.value = "Error";
    }
}
window.addEventListener('keydown', function(e) {
  const key = e.key;
  if ((/^[0-9]$/).test(key)) {
    numberinput(key);
    e.preventDefault();
  } else if (key === '.') {
    numberinput('.');
    e.preventDefault();
  } else if (key === '+' || key === '-' || key === '*' || key === '/') {
    numberinput(key);
    e.preventDefault();
  } else if (key === 'Enter') {
    calculate();
    e.preventDefault();
  } else if (key === 'Backspace') {
    Delbtn();
    e.preventDefault();
  } else if (key === 'Escape') {
    clearAll();
  } else if (key === '%') {
    numberinput('%');
    e.preventDefault();
  } else if (key === '(' || key === ')') {
    // use bracketer to keep logic consistent; insert directly if you prefer
    bracketer();
    e.preventDefault();
  }
});
function clearAll(){
    document.getElementById("inputBox").value = "";
}
function updateDelColor(){
    const inputbox = document.getElementById("inputBox");
    const delButton = document.querySelector(".delbtn");

    if(inputbox.value.length > 0){
        delButton.style.color = "rgb(197, 22, 22)";
    } else {
        delButton.style.color = "#71717e";
    }
}
function Delbtn(){
    const inputbox = document.getElementById("inputBox");
    inputbox.value = inputbox.value.slice(0,-1);
    updateDelColor();
}
function Historys() {
    const panel = document.getElementById("historyPanel");

    if(panel.style.display === "none"){
        panel.style.display = "block";
    }
    else{
        panel.style.display = "none";
    }
}
function saveHistory(expr, result){
    historyArray.unshift({expr, result});
    localStorage.setItem("calcHistory", JSON.stringify(historyArray));
    renderHistory();
}
function renderHistory() {
    const panel = document.getElementById("historyPanel");

    if(historyArray.length === 0){
        panel.innerHTML = "<div>No History</div>";
        return;
    }

    panel.innerHTML = historyArray
        .map(item => `<div>${item.expr} = ${item.result}</div>`)
        .join("");
}
renderHistory();
</script>

</body>
</html>
